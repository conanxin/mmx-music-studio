name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Static checks: no server, no secrets, no network ──────────────────────
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version:22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # TypeScript
      - name: Typecheck server
        run: npm run typecheck:server

      - name: Typecheck web
        run: npm run typecheck

      - name: Typecheck weapp
        run: npm run weapp:typecheck

      # Build
      - name: Build web
        run: npm run build

      - name: Build weapp
        run: npm run weapp:build

      # Manifest / release checks
      - name: Manifest audit
        run: npm run manifest:audit

      - name: Release check
        run: npm run release:check

      # Static smoke tests (no server needed)
      - name: Studio CLI submit guard
        run: bash scripts/studio-cli-submit-guard-smoke-test.sh

      - name: Audio duration display
        run: bash scripts/audio-duration-display-smoke-test.sh

      - name: WeApp BYOK strategy
        run: bash scripts/weapp-byok-strategy-smoke-test.sh

      # Secret scan
      - name: Secret scan
        run: |
          grep -RInE \
            "sk-[A-Za-z0-9_-]{20,}|sk_[A-Za-z0-9_-]{20,}|Bearer [A-Za-z0-9._-]{20,}|Authorization: Bearer|MINIMAX_API_KEY=.*[A-Za-z0-9_-]{10,}|PREVIEW_ACCESS_PIN=.*[0-9A-Za-z_-]{6,}|GENERATION_ACCESS_PIN=.*[0-9A-Za-z_-]{6,}" \
            . \
            --exclude-dir=node_modules \
            --exclude-dir=dist \
            --exclude-dir=.git \
            --exclude-dir=storage \
            --exclude-dir=tmp \
            --exclude="*.png" \
            --exclude="*.zip" \
            --exclude="*.mp3" \
            --exclude="*.wav" \
            > /tmp/ci-secret-scan-raw.txt 2>&1 || true

          grep -v "\.env\.example" /tmp/ci-secret-scan-raw.txt \
          | grep -v "\.env\.demo\.example" \
          | grep -v "\.env\.private-real\.example" \
          | grep -v "\.env\.production-locked\.example" \
          | grep -v "fake" \
          | grep -v "FAKE" \
          | grep -v "placeholder" \
          | grep -v "<your" \
          | grep -v "smoke-test" \
          | grep -v "BYOK_REAL_TEST" \
          | grep -v "package-lock.json" \
          > /tmp/ci-secret-scan-filtered.txt || true

          if [ -s /tmp/ci-secret-scan-filtered.txt ]; then
            echo "Potential real secret found:"
            cat /tmp/ci-secret-scan-filtered.txt
            exit 1
          else
            echo "Secret scan CLEAN"
          fi

  # ── Server-dependent checks: starts mock server on a random port ─────────
  # These tests start their own server process and do NOT share a port.
  # They use MOCK_GENERATION_ENABLED=true so no real generation is possible.
  smoke-server:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Studio hydration — needs a running server with existing tracks
      - name: Studio hydration smoke
        run: bash scripts/studio-initial-player-hydration-smoke-test.sh
        env:
          # CI always uses mock backend — no real tracks needed for the static checks,
          # but the script also verifies /api/tracks returns audioUrl/downloadUrl.
          # Start a mock server on port 8790 so the script's curl hits it.
          MOCK_GENERATION_ENABLED: true
          MINIMAX_BACKEND: cli
          PORT: 8790

      - name: Studio handoff smoke
        run: bash scripts/studio-player-handoff-smoke-test.sh
        env:
          MOCK_GENERATION_ENABLED: true
          MINIMAX_BACKEND: cli
          PORT: 8791

      - name: BYOK mode smoke
        run: bash scripts/byok-mode-smoke-test.sh
        env:
          # byok-mode-smoke-test.sh starts its own server on dynamically chosen ports
          MOCK_GENERATION_ENABLED: true

      - name: Real API attempt guard smoke
        run: bash scripts/real-api-attempt-guard-smoke-test.sh
        env:
          # Uses REAL_API_DAILY_ATTEMPT_LIMIT=0 so guard blocks before network call.
          # No real MiniMax API is called.
          REAL_API_DAILY_ATTEMPT_LIMIT: 0
          BASE_URL: http://127.0.0.1:8792