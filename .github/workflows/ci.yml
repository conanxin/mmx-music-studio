name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Static checks: no server, no secrets, no network ──────────────────────
  static:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # TypeScript
      - name: Typecheck server
        run: npm run typecheck:server

      - name: Typecheck web
        run: npm run typecheck

      - name: Typecheck weapp
        run: npm run weapp:typecheck

      # Build
      - name: Build web
        run: npm run build

      - name: Build weapp
        run: npm run weapp:build

      # Manifest / release checks
      - name: Manifest audit
        run: npm run manifest:audit

      - name: Release check
        run: npm run release:check

      # Static smoke tests (no server needed)
      - name: Studio CLI submit guard
        run: bash scripts/studio-cli-submit-guard-smoke-test.sh

      - name: Audio duration display
        run: bash scripts/audio-duration-display-smoke-test.sh

      - name: WeApp BYOK strategy
        run: bash scripts/weapp-byok-strategy-smoke-test.sh

      # Secret scan using Python for reliable multiline handling
      - name: Secret scan
        run: |
          python3 -c "
          import re, subprocess, sys

          result = subprocess.run(
              ['grep', '-RInE',
               'sk-[A-Za-z0-9_-]{20,}|sk_[A-Za-z0-9_-]{20,}|Bearer [A-Za-z0-9._-]{20,}|Authorization: Bearer|MINIMAX_API_KEY=.*[A-Za-z0-9_-]{10,}|PREVIEW_ACCESS_PIN=.*[0-9A-Za-z_-]{6,}|GENERATION_ACCESS_PIN=.*[0-9A-Za-z_-]{6,}',
               '.',
               '--exclude-dir=node_modules',
               '--exclude-dir=dist',
               '--exclude-dir=.git',
               '--exclude-dir=storage',
               '--exclude-dir=tmp',
               '--exclude=*.png',
               '--exclude=*.zip',
               '--exclude=*.mp3',
               '--exclude=*.wav'],
              capture_output=True, text=True
          )

          exclusions = [
              '.env.example', '.env.demo.example', '.env.private-real.example',
              '.env.production-locked.example', 'fake', 'FAKE', 'placeholder',
              '<your', 'smoke-test', 'BYOK_REAL_TEST', 'package-lock.json',
              'MySecurePass2024'
          ]

          matches = []
          for line in result.stdout.splitlines():
              if any(ex in line for ex in exclusions):
                  continue
              matches.append(line)

          if matches:
              print('Potential real secret found:')
              for m in matches:
                  print(m)
              sys.exit(1)
          else:
              print('Secret scan CLEAN')
          "

  # ── Server-dependent smoke tests ────────────────────────────────────────
  # Each script starts its own server process on an isolated port.
  # All use MOCK_GENERATION_ENABLED=true or REAL_API_DAILY_ATTEMPT_LIMIT=0
  # so no real MiniMax API call is possible.
  smoke-server:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Each script manages its own server lifecycle; env vars configure the mode.
      - name: Studio hydration smoke
        run: bash scripts/studio-initial-player-hydration-smoke-test.sh
        env:
          MOCK_GENERATION_ENABLED: true
          MINIMAX_BACKEND: cli
          PORT: 8790

      - name: Studio handoff smoke
        run: bash scripts/studio-player-handoff-smoke-test.sh
        env:
          MOCK_GENERATION_ENABLED: true
          MINIMAX_BACKEND: cli
          PORT: 8791

      - name: BYOK mode smoke
        run: bash scripts/byok-mode-smoke-test.sh
        env:
          MOCK_GENERATION_ENABLED: true

      - name: Real API attempt guard smoke
        run: bash scripts/real-api-attempt-guard-smoke-test.sh
        env:
          REAL_API_DAILY_ATTEMPT_LIMIT: 0
          BASE_URL: http://127.0.0.1:8792
