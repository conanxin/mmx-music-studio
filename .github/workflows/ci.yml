name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Build (must run before typecheck for workspace symlinks) ────────────────
      - name: Build web
        run: npm run build

      # ── TypeScript type checks ─────────────────────────────────────────────────
      - name: Typecheck server
        run: npm run typecheck:server

      - name: Typecheck web
        run: npm run typecheck

      #════════════════════════════════════════════════════════════════════════════
      # WeApp build — self-contained diagnostic script
      # The script runs npm run weapp:build, captures output, always exits 0.
      # Machine-readable result: /tmp/mmx-ci-diagnostics/weapp-build-result.env
      # Human-readable summary:  /tmp/mmx-ci-diagnostics/weapp-build-summary.md
      # ════════════════════════════════════════════════════════════════════════════

      - name: Build weapp diagnostic
        id: build_weapp
        run: bash scripts/ci-weapp-build-diagnostic.sh
        # Script exits 0 always; BUILD_EXIT recorded in result.env

      - name: Read WeApp diagnostic result
        id: weapp_result
        run: |
          set -euo pipefail
          RESULT_ENV="/tmp/mmx-ci-diagnostics/weapp-build-result.env"
          if [ ! -f "$RESULT_ENV" ]; then
            echo "ERROR: result.env not found"
            echo "WEAPP_BUILD_STATUS=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cat "$RESULT_ENV"
          source "$RESULT_ENV"
          echo "status=$WEAPP_BUILD_STATUS" >> "$GITHUB_OUTPUT"
          echo "exit_code=$WEAPP_BUILD_EXIT_CODE" >> "$GITHUB_OUTPUT"

      # ── Blocking gate: fail CI if WeApp build actually failed ───────────────────
      - name: WeApp build gate
        id: weapp_gate
        if: always()
        run: |
          RESULT_ENV="/tmp/mmx-ci-diagnostics/weapp-build-result.env"
          SUMMARY="/tmp/mmx-ci-diagnostics/weapp-build-summary.md"
          if [ ! -f "$RESULT_ENV" ]; then
            echo "ERROR: result.env not found — treating as failure"
            exit 1
          fi
          source "$RESULT_ENV"
          if [ "$WEAPP_BUILD_STATUS" = "failure" ]; then
            echo "=== WeApp build FAILED in CI ==="
            cat "$SUMMARY" || true
            exit 1
          fi
          echo "WeApp build: PASS"
          cat "$SUMMARY" || true

      # ════════════════════════════════════════════════════════════════════════════
      # GitHub Issue for CI-only WeApp build failures (agent visibility)
      # Runs whenever weapp_gate exits non-zero (always() + status check).
      # Creates or updates a single stable issue: "CI diagnostic: WeApp build failure"
      # ════════════════════════════════════════════════════════════════════════════
      - name: Create or update WeApp CI diagnostic issue
        id: create_issue
        if: always() && steps.weapp_result.outputs.status == 'failure'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const diagDir = '/tmp/mmx-ci-diagnostics';
            const summaryPath = diagDir + '/weapp-build-summary.md';
            const resultPath  = diagDir + '/weapp-build-result.env';
            const logPath = diagDir + '/weapp-build.log';

            // Read diagnostics
            let summary = fs.existsSync(summaryPath)
              ? fs.readFileSync(summaryPath, 'utf8').slice(0, 60000)
              : 'No summary found.';
            let logTail = '';
            if (fs.existsSync(logPath)) {
              const lines = fs.readFileSync(logPath, 'utf8').split('\n');
              logTail = lines.slice(-80).join('\n').slice(0, 20000);
            }
            let resultEnv = '';
            if (fs.existsSync(resultPath)) {
              resultEnv = fs.readFileSync(resultPath, 'utf8');
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const sha = process.env.GITHUB_SHA;

            const body = [
              '## Automated: WeApp CI Build Failure',
              '',
              '> **Sanitized diagnostic** — no secrets included.',
              '',
              '### Run',
              `[${runUrl}](${runUrl})`,
              '',
              '### SHA',
              `\`${sha}\``,
              '',
              '### Machine-readable result',
              '```',
              resultEnv,
              '```',
              '',
              '### Sanitized summary',
              summary,
              '',
              '### Build log tail (last 80 lines)',
              '```',
              logTail,
              '```',
            ].join('\n');

            const ISSUE_TITLE = 'CI diagnostic: WeApp build failure';
            const { owner, repo } = context.repo;

            // Ensure label exists (best-effort)
            try {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'ci-diagnostic',
                color: 'd73a4a',
                description: 'Automated CI diagnostic issue'
              });
            } catch (e) {
              // label may already exist — ignore
            }

            // Find existing issue by title
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 50
            });
            const found = existing.data.find(i => i.title === ISSUE_TITLE);

            if (found) {
              await github.rest.issues.update({
                owner, repo,
                issue_number: found.number,
                body,
                labels: ['ci-diagnostic']
              });
              console.log('Updated existing issue #' + found.number);
            } else {
              await github.rest.issues.create({
                owner, repo,
                title: ISSUE_TITLE,
                body,
                labels: ['ci-diagnostic']
              });
              console.log('Created new issue');
            }
            console.log('Issue creation succeeded');

      # ── Print diagnostics (always runs) ───────────────────────────────────────
      - name: Print weapp diagnostics
        if: always()
        run: |
          SUMMARY="/tmp/mmx-ci-diagnostics/weapp-build-summary.md"
          LOG="/tmp/mmx-ci-diagnostics/weapp-build.log"
          RESULT="/tmp/mmx-ci-diagnostics/weapp-build-result.env"
          if [ -f "$RESULT" ]; then
            echo "=== WeApp result ==="
            cat "$RESULT"
            echo ""
          fi
          if [ -f "$SUMMARY" ]; then
            echo "=== weapp build summary ==="
            cat "$SUMMARY"
          fi
          if [ -f "$LOG" ]; then
            echo ""
            echo "=== weapp build log tail (last 100 lines) ==="
            tail -n 100 "$LOG"
          fi
          {
            echo "## WeApp build diagnostic"
            echo ""
            if [ -f "$RESULT" ]; then cat "$RESULT"; echo ""; fi
            if [ -f "$SUMMARY" ]; then cat "$SUMMARY"; fi
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Upload diagnostics artifact ─────────────────────────────────────────────
      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ci-diagnostics
          path: /tmp/mmx-ci-diagnostics
          if-no-files-found: ignore

      # ── Manifest / release checks (advisory only) ───────────────────────────────
      - name: Manifest audit
        continue-on-error: true
        run: npm run manifest:audit

      - name: Release check
        continue-on-error: true
        run: npm run release:check

      # ── Static smoke tests (advisory only) ──────────────────────────────────────
      - name: Studio CLI submit guard
        continue-on-error: true
        run: bash scripts/studio-cli-submit-guard-smoke-test.sh

      - name: Audio duration display
        continue-on-error: true
        run: bash scripts/audio-duration-display-smoke-test.sh

      - name: WeApp BYOK strategy
        continue-on-error: true
        run: bash scripts/weapp-byok-strategy-smoke-test.sh

      # ── Secret scan ─────────────────────────────────────────────────────────────
      - name: Secret scan
        run: python3 scripts/ci-secret-scan.py
