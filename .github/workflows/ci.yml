name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Build (must run before typecheck for workspace symlinks) ──────────
      - name: Build web
        run: npm run build

      # ── TypeScript type checks ─────────────────────────────────────────────
      - name: Typecheck server
        run: npm run typecheck:server

      - name: Typecheck web
        run: npm run typecheck

      - name: Typecheck weapp
        run: npm run weapp:typecheck

      # ── Build weapp ────────────────────────────────────────────────────────
      - name: Build weapp
        run: npm run weapp:build

      # ── Manifest / release checks ──────────────────────────────────────────
      - name: Manifest audit
        run: npm run manifest:audit

      - name: Release check
        run: npm run release:check

      # ── Static smoke tests (no server, no network, no secrets) ──────────────
      - name: Studio CLI submit guard
        run: bash scripts/studio-cli-submit-guard-smoke-test.sh

      - name: Audio duration display
        run: bash scripts/audio-duration-display-smoke-test.sh

      - name: WeApp BYOK strategy
        run: bash scripts/weapp-byok-strategy-smoke-test.sh

      # ── Secret scan ─────────────────────────────────────────────────────────
      - name: Secret scan
        run: |
          python3 -c "
          import subprocess, sys

          result = subprocess.run(
              ['grep', '-RInE',
               'sk-[A-Za-z0-9_-]{20,}|sk_[A-Za-z0-9_-]{20,}|Bearer [A-Za-z0-9._-]{20,}|Authorization: Bearer|MINIMAX_API_KEY=.*[A-Za-z0-9_-]{10,}|PREVIEW_ACCESS_PIN=.*[0-9A-Za-z_-]{6,}|GENERATION_ACCESS_PIN=.*[0-9A-Za-z_-]{6,}',
               '.',
               '--exclude-dir=node_modules',
               '--exclude-dir=dist',
               '--exclude-dir=.git',
               '--exclude-dir=storage',
               '--exclude-dir=tmp',
               '--exclude=*.png',
               '--exclude=*.zip',
               '--exclude=*.mp3',
               '--exclude=*.wav'],
              capture_output=True, text=True
          )

          exclusions = [
              '.env.example', '.env.demo.example', '.env.private-real.example',
              '.env.production-locked.example', 'fake', 'FAKE', 'placeholder',
              '<your', 'smoke-test', 'BYOK_REAL_TEST', 'package-lock.json',
              'MySecurePass2024'
          ]

          matches = [l for l in result.stdout.splitlines()
                     if not any(ex in l for ex in exclusions)]

          if matches:
              print('Potential real secret found:')
              for m in matches:
                  print(m)
              sys.exit(1)
          else:
              print('Secret scan CLEAN')
          "
