name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Build (must run before typecheck for workspace symlinks) ──────────────
      - name: Build web
        run: npm run build

      # ── TypeScript type checks ────────────────────────────────────────────────
      - name: Typecheck server
        run: npm run typecheck:server

      - name: Typecheck web
        run: npm run typecheck

      # ── WeApp build ─────────────────────────────────────────────────────────────
      # Phase WeApp-CI-RootCause-A: Uses self-contained diagnostic script.
      # The script captures build output to /tmp/mmx-ci-diagnostics/ and always exits 0
      # so the diagnostic step never blocks CI (continue-on-error: true).
      # The blocking gate is enforced by the subsequent "WeApp build gate" step,
      # which reads the summary and fails CI only if the build actually failed.
      # ───────────────────────────────────────────────────────────────────────────
      - name: Build weapp diagnostic
        id: build_weapp
        continue-on-error: true
        run: bash scripts/ci-weapp-build-diagnostic.sh

      # ── Blocking gate: fail CI if WeApp build actually failed ─────────────────
      # This step exits 1 if build failed, which triggers the issue creation via
      # the 'if: failure()' condition on the next step.
      - name: WeApp build gate
        id: weapp_gate
        run: |
          SUMMARY="/tmp/mmx-ci-diagnostics/weapp-build-summary.md"
          if [ ! -f "$SUMMARY" ]; then
            echo "ERROR: weapp-build-summary.md not found"
            exit 1
          fi
          if grep -q "\*\*WeApp build: FAIL" "$SUMMARY"; then
            echo "=== WeApp build FAILED in CI ==="
            cat "$SUMMARY"
            echo "=== build log tail ==="
            tail -n 80 "/tmp/mmx-ci-diagnostics/weapp-build.log"
            # Set flag for issue creation step (persists via GITHUB_ENV)
            echo "WEAPP_BUILD_FAILED=true" >> $GITHUB_ENV
            exit 1
          fi
          echo "WeApp build: PASS"
          cat "$SUMMARY"

      # ── Create GitHub Issue if WeApp build failed (for agent visibility) ─────────
      # GITHUB_TOKEN is automatically available and has write access to repo issues.
      # Runs ONLY if weapp_gate step failed (via 'if: failure()').
      - name: Create WeApp CI diagnostic issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('/tmp/mmx-ci-diagnostics/weapp-build-summary.md', 'utf8').slice(0, 60000);
            const log = fs.readFileSync('/tmp/mmx-ci-diagnostics/weapp-build.log', 'utf8').slice(0, 40000);
            const body = [
              '## Automated: WeApp CI Build Failure',
              '',
              '> This issue is auto-created by GitHub Actions CI. No secrets are included.',
              '',
              '### Summary',
              summary,
              '',
              '### Build log (last 80 lines)',
              '```',
              log.split('\n').slice(-80).join('\n'),
              '```',
              '',
              `Run: ${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
              `SHA: \`${process.env.GITHUB_SHA}\``,
            ].join('\n');

            const { repo } = context;
            const title = `CI WeApp build failed — SHA ${process.env.GITHUB_SHA.slice(0,8)}`;
            const existing = await github.rest.issues.listForRepo({
              ...repo, state: 'open', labels: ['ci-diagnostic']
            }).then(r => r.data.find(i => i.title === title));

            if (existing) {
              await github.rest.issues.update({ ...repo, issue_number: existing.number, body });
              console.log('Updated existing issue:', existing.number);
            } else {
              await github.rest.issues.create({ ...repo, title, body, labels: ['ci-diagnostic'] });
              console.log('Created new issue');
            }

      # ── Print diagnostics (always runs) ─────────────────────────────────────────
      - name: Print weapp diagnostics
        if: always()
        run: |
          SUMMARY="/tmp/mmx-ci-diagnostics/weapp-build-summary.md"
          LOG="/tmp/mmx-ci-diagnostics/weapp-build.log"
          if [ -f "$SUMMARY" ]; then
            echo "=== weapp build summary ==="
            cat "$SUMMARY"
          fi
          if [ -f "$LOG" ]; then
            echo ""
            echo "=== weapp build log tail (last 100 lines) ==="
            tail -n 100 "$LOG"
          fi
          echo ""
          echo "## CI WeApp Build Summary"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Build | $(grep '## Summary' -A 1 "$SUMMARY" 2>/dev/null | tail -1 || echo 'unknown') |"
          echo "| node | $(node -v) |"
          echo "| npm | $(npm -v) |"
          echo "| Disk | $(df -h / | tail -1) |"
          echo ""
          echo "Full logs: [ci-diagnostics artifact]"

      # ── Upload diagnostics artifact ─────────────────────────────────────────────
      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: /tmp/mmx-ci-diagnostics
          if-no-files-found: ignore

      # ── Manifest / release checks (advisory only) ──────────────────────────────
      - name: Manifest audit
        continue-on-error: true
        run: npm run manifest:audit

      - name: Release check
        continue-on-error: true
        run: npm run release:check

      # ── Static smoke tests (advisory only) ────────────────────────────────────
      - name: Studio CLI submit guard
        continue-on-error: true
        run: bash scripts/studio-cli-submit-guard-smoke-test.sh

      - name: Audio duration display
        continue-on-error: true
        run: bash scripts/audio-duration-display-smoke-test.sh

      - name: WeApp BYOK strategy
        continue-on-error: true
        run: bash scripts/weapp-byok-strategy-smoke-test.sh

      # ── Secret scan ───────────────────────────────────────────────────────────
      - name: Secret scan
        run: |
          python3 -c "
          import subprocess, sys

          result = subprocess.run(
              ['grep', '-RInE',
               'sk-[A-Za-z0-9_-]{20,}|sk_[A-Za-z0-9_-]{20,}|Bearer [A-Za-z0-9._-]{20,}|Authorization: Bearer|MINIMAX_API_KEY=.*[A-Z...,}',
               '.',
               '--exclude-dir=node_modules',
               '--exclude-dir=dist',
               '--exclude-dir=.git',
               '--exclude-dir=storage',
               '--exclude-dir=tmp',
               '--exclude=*.png',
               '--exclude=*.zip',
               '--exclude=*.mp3',
               '--exclude=*.wav'],
              capture_output=True, text=True
          )

          exclusions = [
              '.env.example', '.env.demo.example', '.env.private-real.example',
              '.env.production-locked.example', 'fake', 'FAKE', 'placeholder',
              '<your', 'smoke-test', 'BYOK_REAL_TEST', 'package-lock.json',
              'MySecurePass2024'
          ]

          matches = [l for l in result.stdout.splitlines()
                     if not any(ex in l for ex in exclusions)]

          if matches:
              print('Potential real secret found:')
              for m in matches:
                  print(m)
              sys.exit(1)
          else:
              print('Secret scan CLEAN')
          "