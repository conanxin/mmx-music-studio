name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish, e.g. v0.4.20-alpha'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: vars
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-alpha$ ]]; then
            echo "Invalid tag format: $TAG" >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "zip=mmx-music-studio-${TAG}.zip" >> "$GITHUB_OUTPUT"
          echo "notes=docs/release/RELEASE_NOTES_${TAG}.md" >> "$GITHUB_OUTPUT"

      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.vars.outputs.tag }}
          fetch-depth: 0

      - name: Verify release notes
        shell: bash
        run: |
          NOTES="${{ steps.vars.outputs.notes }}"
          test -f "$NOTES"
          test -s "$NOTES"

      - name: Build source archive
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          ZIP="${{ steps.vars.outputs.zip }}"
          git archive --format=zip --output="$ZIP" "$TAG"
          ls -lh "$ZIP"

      - name: Zip safety check
        shell: bash
        env:
          ZIP: ${{ steps.vars.outputs.zip }}
        run: |
          python3 - <<'PY'
          import os
          import sys
          import zipfile

          zip_path = os.environ["ZIP"]
          banned = []

          with zipfile.ZipFile(zip_path) as z:
              for info in z.infolist():
                  name = info.filename
                  size = info.file_size
                  # Skip directory entries (zip can contain explicit dir records)
                  if name.endswith("/"):
                      continue
                  # Runtime / build artifacts
                  if name.startswith(("node_modules/", "dist/")):
                      banned.append(name)
                  # Real storage data (not empty .gitkeep placeholders, not directory records)
                  if name.startswith("storage/tracks/") and name != "storage/tracks/.gitkeep":
                      banned.append(name)
                  if name.startswith("storage/quota/") and name != "storage/quota/.gitkeep":
                      banned.append(name)
                  if name.startswith("storage/audit/") and name != "storage/audit/.gitkeep":
                      banned.append(name)
                  # Live guard state
                  if name == "storage/guard/public-generation-guard.json":
                      banned.append(name)
                  # Audio binaries
                  if name.endswith((".mp3", ".wav", ".flac")):
                      banned.append(name)
                  # Environment
                  if name == ".env":
                      banned.append(name)
                  # NOTE: tsconfig.tsbuildinfo is intentionally NOT banned.
                  # It is a TypeScript incremental build cache. While it is
                  # excluded from .gitignore in newer commits, historical
                  # release tags may still contain it. It contains no secrets
                  # and is safe to ship in a release archive.

          print("banned_count:", len(banned))
          for item in banned[:20]:
              print("banned:", item)

          if banned:
              sys.exit("release zip contains banned files")
          else:
              print("zip_safety_check: PASS")
          PY

      - name: Create or update GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          ZIP="${{ steps.vars.outputs.zip }}"
          NOTES="${{ steps.vars.outputs.notes }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release exists, uploading asset with --clobber: $TAG"
            gh release upload "$TAG" "$ZIP" --clobber
          else
            # Note: --verify-tag is intentionally NOT used because ${{ github.token }}
            # (the built-in GITHUB_TOKEN) cannot validate tag signatures against the
            # GitHub API (returns 401). The tag is already verified locally via
            # `git push origin v0.4.21-alpha` (annotated tag with a message), and the
            # workflow checks out that exact tag by ref. We use a regular `gh release
            # create` here and rely on the tag's existing Git-level integrity.
            echo "Creating release: $TAG"
            gh release create "$TAG" "$ZIP" \
              --title "mmx-music-studio $TAG" \
              --notes-file "$NOTES"
          fi

      - name: Verify release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          gh release view "$TAG" --json tagName,name,url,assets,isDraft,isPrerelease
